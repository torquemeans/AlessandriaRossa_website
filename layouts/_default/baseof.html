<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">

<head>
    <meta charset="UTF-8">
    <title> {{ .Site.Title }} </title>
    <link rel="icon" type="image/png" href="{{ "favicon.png" | relURL }}">
    <style>
  @font-face {
    font-family: 'WebGaramond';
    src: url('{{ "media/font/EBGaramond.woff2" | absURL }}') format('woff2');
    font-weight: 100 900;
  }

 
  * {
    font-family: 'WebGaramond', sans-serif !important;
    font-size: 1.2rem;

  }
  
</style>
</head>

<body>
    {{ partial "header" . }}

    {{ block "main" . }}
    {{ end }}

    <footer class="site-footer">
        <div class="footer-container">
            <p>{{ i18n "contact" }}:
                    <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
            </p>
        </div>
    </footer>


    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        main {
            text-align: justify;
            flex: 1 0 auto;
        }

        .site-footer {
            background-color: #9b3c3c;
            color: #fff;
            padding: 20px;
            text-align: center;
            /* font-family: system-ui, Arial, sans-serif; */
            flex-shrink: 0;
        }

        .site-footer a {
            color: #fff;
            text-decoration: none;
        }

        .site-footer a:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>


</body>

</html>
